services:
  - type: web
    name: aravindh-portfolio
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: portfolio_db
      - key: MONGODB_COLLECTION
        value: contacts
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: duraiaravindh2002@gmail.com
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: "Aravindh <duraiaravindh2002@gmail.com>"
      - key: MAIL_TO
        value: duraiaravindh2002@gmail.com
